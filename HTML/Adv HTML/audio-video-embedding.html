<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio and Video embedding</title>
</head>
<body>
    <h1>Media in HTML</h1>
    <h2>Audio :</h2>
    <!-- <audio src="a.mp3" controls>Sound</audio> -->

    <audio controls>
        <source src='a.mp3' type="audio/mpeg">
        Your browser doesn't support this audio
    </audio>

    <h2>Video</h2>
    <video controls width="320">
    <source src="harry.mp4" type="video/mp4">
    Your browser doesn't support the video
</video>
</body>
</html>
