<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists in HTML</title>
</head>

<body>
    <p>Here is example of lists in html</p>

    <h3>Below is Ordered list</h3>
    <ol>
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
        <li>Cherry</li>
    </ol>

    <h3>Below is Un-ordered list</h3>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
        <li>Cherry</li>
    </ul>

    <h3>Below is Descriptive list</h3>
    <dl>
        <dt>HTML</dt>
        <dd>A markput language for creating web pages.</dd>
        <dt>CSS</dt>
        <dd>Used for styling HTML web pages.</dd>
    </dl>
</body>

</html>
