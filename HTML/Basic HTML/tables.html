<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <h1>Below is the example of a table </h1>

    <table border="1">
        <tr>
            <th>S.No</th>
            <th>Name</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>1</td>
            <td colspan="">Arun</td>
            <td>20</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Babloo</td>
            <td>30</td>
        </tr>
    </table>
</body>
</html>
